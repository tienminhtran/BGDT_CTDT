server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cho phép upload video lớn (khớp MAX_VIDEO_MB của backend)
    client_max_body_size 2048m;

    # SPA: mọi route không phải file tĩnh đều trả index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Chuyển toàn bộ /api/* sang backend (cùng mạng docker)
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Stream video HLS: tắt buffering, kéo dài timeout
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health check backend (tuỳ chọn)
    location = /health {
        proxy_pass http://backend:3000/health;
    }
}
