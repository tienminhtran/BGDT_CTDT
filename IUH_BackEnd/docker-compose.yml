services:
  minio:
    image: minio/minio:latest
    container_name: iuh_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tranminhtien@2026@dichomuabanh}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Container phụ: tự tạo bucket sau khi MinIO sẵn sàng rồi thoát.
  createbuckets:
    image: minio/mc:latest
    container_name: iuh_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-tranminhtien@2026@dichomuabanh};
      mc mb --ignore-existing local/${MINIO_BUCKET:-baigiang};
      mc anonymous set download local/${MINIO_BUCKET:-baigiang};
      echo 'Bucket ${MINIO_BUCKET:-baigiang} da san sang';
      exit 0;
      "

volumes:
  minio_data:
