
services:
  # ---------- Object storage ----------
  minio:
    image: minio/minio:latest
    container_name: iuh_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Tạo bucket khi MinIO sẵn sàng rồi thoát
  createbuckets:
    image: minio/mc:latest
    container_name: iuh_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123} && mc mb --ignore-existing local/${MINIO_BUCKET:-baigiang}"

  # ---------- Backend (Node.js + Express) ----------
  backend:
    build: ./IUH_BackEnd
    container_name: iuh_backend
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env                 # nạp toàn bộ biến từ .env
    environment:                   # ghi đè các biến đặc thù container
      NODE_ENV: production
      MINIO_ENDPOINT: http://minio:9000   # gọi MinIO qua mạng nội bộ
      FFMPEG_PATH: /usr/bin/ffmpeg
    ports:
      - "${BACKEND_PORT:-3000}:3000"      # tuỳ chọn, để debug

  # ---------- Frontend (Vite/React + nginx) ----------
  frontend:
    build:
      context: ./IUH_FontEnd
      args:
        VITE_API_BASE_URL: /api
        VITE_LMS_BASE_URL: ${VITE_LMS_BASE_URL:-https://lms.iuh.edu.vn}
        VITE_UPLOAD_API_KEY: ${UPLOAD_API_KEY}
    container_name: iuh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

  # ---------- Teacher Frontend (Vite/React + nginx) ----------
  teacher:
    build:
      context: ./IUH_FE_Teacher
      args:
        VITE_API_BASE_URL: /api
        VITE_LMS_BASE_URL: ${VITE_LMS_BASE_URL:-https://lms.iuh.edu.vn}
        VITE_UPLOAD_API_KEY: ${UPLOAD_API_KEY}
        VITE_TEACHER_KEY: ${KEY_LOGIN_TEACHER}
    container_name: iuh_teacher
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${TEACHER_PORT:-8080}:80"

volumes:
  minio_data:
