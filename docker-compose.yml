# ============================================================
#  Docker Compose CHUNG: MinIO + Backend + Frontend
#  Triển khai cả hệ thống lên server bằng 1 lệnh:
#      docker compose up -d --build
#  Cấu hình qua file .env (xem .env.example) đặt cùng thư mục.
# ============================================================

services:
  # ---------- Object storage ----------
  minio:
    image: minio/minio:latest
    container_name: iuh_minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"      # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001"  # Web Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Container phụ: tạo bucket sau khi MinIO sẵn sàng rồi thoát.
  createbuckets:
    image: minio/mc:latest
    container_name: iuh_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb --ignore-existing local/${MINIO_BUCKET:-baigiang};
      echo 'Bucket ${MINIO_BUCKET:-baigiang} da san sang (private)';
      exit 0;
      "

  # ---------- Backend (Node.js + Express) ----------
  backend:
    build: ./IUH_BackEnd
    image: iuh_backend
    container_name: iuh_backend
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      PORT: 3000
      NODE_ENV: production

      # SQL Server (DB chạy NGOÀI docker - điền IP/cổng thật trong .env)
      DB_SERVER: ${DB_SERVER}
      DB_PORT: ${DB_PORT:-1433}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ENCRYPT: ${DB_ENCRYPT:-false}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:-true}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}

      # Moodle LMS
      MOODLE_URL: ${MOODLE_URL:-https://lms.iuh.edu.vn}
      MOODLE_SERVICE: ${MOODLE_SERVICE:-moodle_mobile_app}
      MOODLE_TLS_INSECURE: ${MOODLE_TLS_INSECURE:-true}

      # MinIO: backend gọi qua mạng nội bộ docker (service "minio")
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET: ${MINIO_BUCKET:-baigiang}
      MINIO_USE_SSL: "false"

      # Upload / HLS video
      FFMPEG_PATH: /usr/bin/ffmpeg
      HLS_SEGMENT_TIME: ${HLS_SEGMENT_TIME:-6}
      MAX_VIDEO_MB: ${MAX_VIDEO_MB:-2048}
      HLS_TOKEN_TTL: ${HLS_TOKEN_TTL:-6h}
    # Mở cổng ra host để debug trực tiếp (không bắt buộc - frontend đã proxy /api)
    ports:
      - "${BACKEND_PORT:-3000}:3000"

  # ---------- Frontend (Vite/React + nginx) ----------
  frontend:
    build:
      context: ./IUH_FontEnd
      args:
        VITE_API_BASE_URL: /api
        VITE_LMS_BASE_URL: ${VITE_LMS_BASE_URL:-https://lms.iuh.edu.vn}
    image: iuh_frontend
    container_name: iuh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-80}:80"

volumes:
  minio_data:
